name: QA - Load Test & Visual Diff

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  locust-smoke:
    name: Locust Smoke (10u / 30s)
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: signalforge
          POSTGRES_PASSWORD: signalforge_pass
          POSTGRES_DB: signalforge
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install locust

      - name: Seed test DB (minimal fixtures)
        run: |
          cd backend
          # alembic 또는 seed 스크립트로 최소 데이터 주입
          alembic upgrade head || true
          python -m app.seeds.minimal || true

      - name: Start FastAPI backend
        run: |
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          # health check 대기
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 1
          done

      - name: Run Locust smoke (10 users / 30s)
        run: |
          locust --headless \
            --users 10 --spawn-rate 5 --run-time 30s \
            -H http://127.0.0.1:8000 \
            -f tests/qa/locustfile.py \
            --csv tests/qa/locust_report \
            --only-summary
      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: tests/qa/locust_report_*.csv

      - name: Print backend log on failure
        if: failure()
        run: tail -200 /tmp/uvicorn.log || true

  screenshot-diff:
    name: Visual Regression
    runs-on: ubuntu-22.04
    # 첫 도입 시에는 baseline 이 없으므로 우선 placeholder 로만 동작.
    # baseline png 가 채워지면 continue-on-error 를 false 로 변경.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Playwright
        run: |
          pip install playwright pillow
          python -m playwright install --with-deps chromium

      - name: Build & start frontend (placeholder)
        run: |
          # TODO: 프론트 build / preview 가동
          # cd frontend && npm ci && npm run build && npm run preview &
          echo "frontend startup placeholder"

      - name: Run screenshot diff (placeholder)
        run: |
          if [ -f tests/qa/screenshot_runner.py ]; then
            python tests/qa/screenshot_runner.py
          else
            echo "screenshot_runner.py 없음 — skip"
          fi

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diff
          path: tests/qa/screenshots/diff/
          if-no-files-found: ignore
