# SignalForge Dashboard — On-prem Nginx site config
#
# Activate:
#   sudo cp /home/koopark/claude/SignalForge/nginx/dashboard.conf \
#           /etc/nginx/sites-available/signalforge.conf
#   sudo ln -sf /etc/nginx/sites-available/signalforge.conf \
#               /etc/nginx/sites-enabled/signalforge.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prereqs:
#   - htpasswd file at /etc/nginx/htpasswd-sf (see htpasswd-sf.example)
#   - React build deployed to /var/www/signalforge/dashboard/
#   - FastAPI running on 127.0.0.1:8000

# Optional rate limit zone (uncomment to enable)
# limit_req_zone $binary_remote_addr zone=sf_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name signalforge.internal;

    # ---- Logging ----
    access_log /var/log/nginx/signalforge.access.log;
    error_log  /var/log/nginx/signalforge.error.log warn;

    # ---- Common security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ---- Body size for VOC bulk import etc ----
    client_max_body_size 32m;

    # ---- IP whitelist (P1~P3) ----
    # Replace placeholders with actual internal subnets before reload.
    # Example: 10.0.0.0/8 / 192.168.0.0/16 / VPN range
    set $sf_acl "0";
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # allow 127.0.0.1;
    # deny  all;

    # ---- Basic Auth (applies to all locations below by default) ----
    auth_basic           "SignalForge — Internal Only";
    auth_basic_user_file /etc/nginx/htpasswd-sf;

    # ---- Root redirect: / -> /dashboard/ ----
    location = / {
        return 302 /dashboard/;
    }

    # ---- Static React SPA (Vite build output) ----
    location /dashboard/ {
        alias /var/www/signalforge/dashboard/;
        index index.html;

        # SPA fallback — unknown paths go to index.html so React Router works
        try_files $uri $uri/ /dashboard/index.html;

        # Cache hashed assets aggressively, never cache index.html
        location ~* /dashboard/assets/.*\.(?:js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
            alias /var/www/signalforge/dashboard/assets/;
            try_files $uri =404;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- FastAPI REST API ----
    location /api/ {
        # limit_req zone=sf_api burst=40 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-User  $remote_user;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;   # LLM insight calls can be slow
    }

    # ---- WebSocket (live updates / Celery progress) ----
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-User  $remote_user;

        proxy_read_timeout 3600s;     # long-lived WS
        proxy_send_timeout 3600s;
    }

    # ---- FastAPI auto-docs (still behind Basic Auth + IP) ----
    location = /docs         { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /redoc        { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /openapi.json { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }

    # ---- Health probe (no auth so monitoring can hit it) ----
    location = /healthz {
        auth_basic        off;
        access_log        off;
        proxy_pass        http://127.0.0.1:8000/health;
        proxy_set_header  Host $host;
    }

    # ---- Deny hidden/dotfiles ----
    location ~ /\.(?!well-known) {
        deny all;
    }
}
