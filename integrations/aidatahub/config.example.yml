# SignalForge → AX Hub 동기화 설정
#
# 환경변수 ${VAR} 자동 치환. 비밀 키는 환경변수로 분리하라.

aidatahub:
  base_url: "http://aidatahub:8001"
  api_key: "${AIDH_API_KEY}"
  external_source: "signalforge"

signalforge:
  # 한 가지 선택:
  #
  # (A) HTTP 모드 — 별도 호스트에서 실행 가능. 기존 SF API 그대로 사용.
  base_url: "http://localhost:8000"
  api_key: "${SF_INTERNAL_KEY}"
  #
  # (B) DB 직접 모드 — SignalForge Celery worker 내부에서 실행 시 가장 빠름.
  #     db_url 가 있으면 base_url 보다 우선 사용.
  # db_url: "${SF_DATABASE_URL}"

sync:
  # 한 호출당 AX Hub 에 보내는 record 수 (1~1000)
  batch_size: 100

  # HTTP 모드 페이지네이션
  page_size: 100

  # 우리 측 throttle (req/s) — SF rate limit 헤더 없을 때 자체 보호
  max_rps: 4.0

  # 제품 코드 (HTTP 모드: 이 순서로 반복 호출)
  product_codes:
    - GS   # Galaxy S
    - GZ   # Galaxy Z
    - GA   # Galaxy A / FE
    - GW   # Galaxy Watch
    - GB   # Galaxy Buds
    - GR   # Galaxy Ring

  filter:
    # NLP processed 안 된 VOC 는 skip (sentiment_label 미존재로 매핑 실패 방지)
    require_processed_at: true
    # 개인정보 마스킹 미확인 record skip
    skip_when_pii_unmasked: true
    # 특정 sentiment 만 (옵션) — 비우면 전체
    # sentiment_labels: [very_negative, negative]

  # 데이터 보존
  fields_to_keep:
    - id
    - external_id
    - source_url
    - content_original
    - content_translated
    - language_detected
    - country_code
    - sentiment_score
    - sentiment_label
    - categories
    - likes_count
    - comments_count
    - shares_count
    - engagement_score
    - published_at
    - processed_at
    - pii_masked
    - product
    - platform
