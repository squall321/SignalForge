# SignalForge frontend nginx conf — *참고용 템플릿*.
#
# 기본 production 경로는 frontend.def 의 `serve -s /opt/web/dist` 이며,
# 그 앞단 reverse-proxy (HWAX 포털 nginx) 가 /signalforge/ → frontend:5173 으로 포워딩한다.
# 따라서 이 파일은 컨테이너 안에서 직접 쓰이지는 않는다.
#
# 다만 standalone 으로 (포털 없이) 단일 nginx 로 prod 서빙하고 싶을 때를 위해
# HWAX/MXWP 의 nginx snippet 패턴을 그대로 옮겨둔다. gen-nginx-conf.sh 에서
# 이 파일을 envsubst 하면 portal 환경에 맞춘 conf 를 만들 수 있다.

server {
    listen       80 default_server;
    server_name  _;

    # SPA dist root. frontend.sif 안에서는 /opt/web/dist 로 베이크된다.
    root         /opt/web/dist;
    index        index.html;

    # 정적 자산은 long cache (immutable hash 가 파일명에 박혀있다).
    location /signalforge/assets/ {
        alias /opt/web/dist/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # backend API. 같은 머신에서 18000 으로 가동되는 uvicorn 으로 strip-prefix 후 포워딩.
    location /signalforge/api/ {
        proxy_pass         http://127.0.0.1:18000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket — P4.0 알림 브로드캐스트.
    location /signalforge/ws/ {
        proxy_pass         http://127.0.0.1:18000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — 모든 미지정 path 는 index.html 로 (BrowserRouter 가 client-side 라우팅).
    location /signalforge/ {
        alias /opt/web/dist/;
        try_files $uri $uri/ /signalforge/index.html;
    }
}
