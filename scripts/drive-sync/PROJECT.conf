# SignalForge 용 Drive-Sync 설정 (AIDataHub 표준 키트 이식)
#
# 검증 기원: AIDataHub deploy/templates/drive-sync/ (2026-06-01)

# 1) Dump 파일명 prefix — 결과물: sf-db-YYYYMMDD-HHMMSSZ.sql.gz
PROJ_PREFIX=sf

# 2) Drive 폴더 식별자 — ApptainerImages:SignalForge/db-dumps/
PROJ_NAME=SignalForge

# 3) apptainer PG 인스턴스 이름 (확인됨: sf_postgres)
PROJ_PG_INSTANCE=sf_postgres

# 4) .env 위치 — POSTGRES_USER/PASSWORD/DB/PORT
PROJ_ENV_FILE=/home/koopark/claude/SignalForge/.env

# 5) 로컬 dump 저장 디렉터리 (없으면 자동 생성)
PROJ_DUMP_DIR=/home/koopark/claude/SignalForge/backups

# 6) rclone remote 이름 — 같은 호스트의 다른 프로젝트와 공유
PROJ_DRIVE_REMOTE_DEFAULT=ApptainerImages

# 7) Drive 보존 개수 (최신 N개만 유지)
PROJ_DRIVE_RETAIN_DEFAULT=5

# 8) (선택) restore 후 health-check — SignalForge backend 가 8000 이면:
PROJ_HEALTH_URL=http://127.0.0.1:8000/health
# 운영시 채워넣기: http://127.0.0.1:8000/api/v1/health
